<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VibeSync</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #121212;
  height: 100vh;
  display: grid; place-items: center;
  overflow: hidden;
}
.splash {
  display: flex; align-items: center; gap: 16px;
  animation: fadeUp 0.8s ease-out;
}
.mark {
  width: 84px; height: 84px;
  border-radius: 50%;
  background: #1DB954;
  position: relative;
  box-shadow: 0 12px 40px rgba(29,185,84,0.45);
}
.mark::before, .mark::after, .mark span {
  content: ''; position: absolute;
  left: 18px; right: 18px;
  height: 5px;
  background: #000;
  border-radius: 3px;
}
.mark::before { top: 25px; }
.mark span { top: 40px; left: 22px; right: 22px; }
.mark::after { top: 55px; left: 26px; right: 26px; }
h1 {
  color: #fff;
  font: 700 48px/1 'Plus Jakarta Sans', system-ui, sans-serif;
  letter-spacing: -0.03em;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeOut {
  to { opacity: 0; transform: scale(1.1); }
}
body.exit .splash { animation: fadeOut 0.5s ease-in forwards; }
</style>
</head>
<body>
<div class="splash">
  <div class="mark"><span></span></div>
  <h1>VibeSync</h1>
</div>
<script>
const dest = localStorage.getItem('vs_user') && localStorage.getItem('vs_prefs') ? 'index.html' : 'welcome.html';
setTimeout(() => {
  document.body.classList.add('exit');
  setTimeout(() => location.replace(dest), 450);
}, 2200);
</script>
</body>
</html>
