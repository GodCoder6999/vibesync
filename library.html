<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liked Songs – VibeSync</title>
<link rel="icon" href="https://www.scdn.co/i/_global/favicon.png">
<link rel="stylesheet" href="styles.css">
<script>
if (!localStorage.getItem('vs_user') || !localStorage.getItem('vs_prefs')) {
  location.replace('welcome.html');
}
</script>
</head>
<body>
<div class="app">
  <div id="chrome-sidebar"></div>
  <main class="main">
    <header class="topbar">
      <div class="tb-arrows">
        <button class="arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.03.47a.75.75 0 0 1 0 1.06L4.56 8l6.47 6.47a.75.75 0 1 1-1.06 1.06L2.44 8 9.97.47a.75.75 0 0 1 1.06 0z"/></svg></button>
        <button class="arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M4.97.47a.75.75 0 0 0 0 1.06L11.44 8l-6.47 6.47a.75.75 0 1 0 1.06 1.06L13.56 8 6.03.47a.75.75 0 0 0-1.06 0z"/></svg></button>
      </div>
      <div class="tb-search-wrap">
        <div class="tb-search">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 1 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.28 7.407-7.28s7.407 3.274 7.407 7.28-3.302 7.279-7.407 7.279-7.407-3.273-7.407-7.28z"/></svg>
          <input placeholder="What do you want to play?" data-search-input>
        </div>
        <div class="search-results" data-search-results></div>
      </div>
      <div class="tb-actions">
        <button class="pill-btn dark" id="installBtn">Install App</button>
        <button class="pill-btn" id="logoutBtn">Log out</button>
        <button class="avatar-btn" id="userAvatar">U</button>
      </div>
    </header>

    <div class="main-scroll">
      <div class="page-hero" style="--hero-color:#4538d4">
        <div class="page-hero-inner">
          <div class="page-hero-art" style="background:linear-gradient(135deg,#4538d4,#a6b3ff);display:grid;place-items:center;color:#fff">
            <svg width="80" height="80" viewBox="0 0 16 16" fill="currentColor"><path d="M15.724 4.22A4.313 4.313 0 0 0 12.192.814a4.269 4.269 0 0 0-3.622 1.13.837.837 0 0 1-1.14 0 4.272 4.272 0 0 0-6.21 5.855l5.916 7.05a1.128 1.128 0 0 0 1.727 0l5.916-7.05a4.228 4.228 0 0 0 .945-3.578z"/></svg>
          </div>
          <div class="page-hero-info">
            <div class="type">Playlist</div>
            <h1>Liked Songs</h1>
            <div class="meta">
              <strong id="userName">You</strong>
              <span class="meta-dot"></span>
              <span id="songCount">0 songs</span>
            </div>
          </div>
        </div>
      </div>

      <div class="action-bar">
        <button class="play-big" id="playAllBtn"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288V1.713z"/></svg></button>
        <button class="ab-icon"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.151.922a.75.75 0 1 0-1.06 1.06L13.109 3H11.16a3.75 3.75 0 0 0-2.873 1.34l-6.173 7.356A2.25 2.25 0 0 1 .39 12.5H0V14h.391a3.75 3.75 0 0 0 2.873-1.34l6.173-7.356a2.25 2.25 0 0 1 1.724-.804h1.947l-1.017 1.018a.75.75 0 0 0 1.06 1.06L15.98 3.75 13.15.922zM.391 3.5H0V2h.391c1.109 0 2.16.49 2.873 1.34L4.89 5.277l-.979 1.167-1.796-2.14A2.25 2.25 0 0 0 .39 3.5z"/></svg></button>
        <button class="ab-icon"><svg viewBox="0 0 16 16" fill="currentColor"><circle cx="2" cy="8" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="14" cy="8" r="1.5"/></svg></button>
      </div>

      <div class="song-table">
        <div class="row head">
          <div class="num">#</div>
          <div>Title</div>
          <div>Album</div>
          <div>Date added</div>
          <div class="duration">⏱</div>
        </div>
        <div id="songList"></div>
        <div id="emptyMsg" style="display:none;padding:60px 16px;text-align:center;color:var(--text-muted)">
          <h3 style="font-size:18px;margin-bottom:8px;color:var(--text)">Songs you like will appear here</h3>
          <p>Save songs by tapping the heart icon.</p>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="chrome-mini"></div>
<script src="partials.js"></script>
<script>mountChrome('library');</script>
<script src="config.js"></script>
<script src="catalog.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>
<script>
const user = JSON.parse(localStorage.getItem('vs_user') || '{}');
document.getElementById('userName').textContent = user.name || 'You';

const liked = JSON.parse(localStorage.getItem('vs_liked') || '[]');
const list = document.getElementById('songList');
const empty = document.getElementById('emptyMsg');

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s) { return String(s).replace(/'/g, '&#39;'); }
function fmt(s) { const m = Math.floor(s/60), sec = String(Math.floor(s%60)).padStart(2,'0'); return `${m}:${sec}`; }

// Load track meta for each liked id via search
async function loadLiked() {
  if (!liked.length) {
    empty.style.display = 'block';
    document.getElementById('songCount').textContent = '0 songs';
    return;
  }
  document.getElementById('songCount').textContent = `${liked.length} song${liked.length===1?'':'s'}`;
  // We saved only IDs. Without full tracks, fetch each via search by ID is not supported by JioSaavn quick.
  // Workaround: store full track JSON in vs_liked_tracks; check there.
  const fullLiked = JSON.parse(localStorage.getItem('vs_liked_tracks') || '[]').filter(Boolean);
  if (!fullLiked.length) {
    empty.style.display = 'block';
    return;
  }
  list.innerHTML = fullLiked.map((t, i) => `
    <button class="row" data-idx="${i}">
      <div class="num">${i+1}</div>
      <div class="title-cell">
        <div class="row-cover" ${t.img ? `style="background-image:url(&quot;${t.img}&quot;)"` : ''}></div>
        <div class="title-text"><strong>${esc(t.title)}</strong><span>${esc(t.artist || '')}</span></div>
      </div>
      <div>${esc(t.album || '')}</div>
      <div>Recently</div>
      <div class="duration">${fmt(t.duration || 0)}</div>
    </button>`).join('');

  list.querySelectorAll('.row[data-idx]').forEach(r => {
    r.addEventListener('click', () => {
      const i = parseInt(r.dataset.idx, 10);
      if (window.vsSetQueue) window.vsSetQueue(fullLiked, i);
    });
  });

  document.getElementById('playAllBtn').addEventListener('click', () => {
    if (window.vsSetQueue) window.vsSetQueue(fullLiked, 0);
  });
}

loadLiked();
</script>
</body>
</html>
